name: Deploy

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: prod
        type: choice
        options:
          - dev
          - stg
          - prod
  # push:
  #   branches:
  #     - main

run-name: Deploy to AWS ${{ inputs.environment }} environment

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ENV: ${{ inputs.environment }}
  COMMIT_HASH: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install root dependencies
      - name: Install root dependencies
        run: npm install

      # Set environment variables
      - name: Set environment variables
        run: |
          if [ "${{ inputs.environment }}" == "dev" ]; then
            echo "NEXT_PUBLIC_REGION=us-east-1" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_USER_POOL_ID=us-east-1_devUserPoolId" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_USER_POOL_CLIENT_ID=devUserPoolClientId" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_URL=https://api.dev.notoa.tech" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_CLOUDFRONT_URL=https://app.dev.notoa.tech" >> $GITHUB_ENV
            echo "BUCKET_NAME=notoa-dev-frontend" >> $GITHUB_ENV
            echo "STACK_NAME=NotoaDev" >> $GITHUB_ENV
          elif [ "${{ inputs.environment }}" == "stg" ]; then
            echo "NEXT_PUBLIC_REGION=us-east-1" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_USER_POOL_ID=us-east-1_stgUserPoolId" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_USER_POOL_CLIENT_ID=stgUserPoolClientId" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_URL=https://api.stg.notoa.tech" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_CLOUDFRONT_URL=https://app.stg.notoa.tech" >> $GITHUB_ENV
            echo "BUCKET_NAME=notoa-stg-frontend" >> $GITHUB_ENV
            echo "STACK_NAME=NotoaStg" >> $GITHUB_ENV
          else # prod
            echo "NEXT_PUBLIC_REGION=us-east-1" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_USER_POOL_ID=us-east-1_h2RYmasvb" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_USER_POOL_CLIENT_ID=thcbivps9f8tmfnm8h5a23qcv" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_URL=https://api.notoa.tech" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_CLOUDFRONT_URL=https://app.notoa.tech" >> $GITHUB_ENV
            echo "BUCKET_NAME=notoa-prod-frontend" >> $GITHUB_ENV
            echo "STACK_NAME=NotoaProd" >> $GITHUB_ENV
          fi


      - name: Display environment information
        run: |
          echo "AWS_ACCOUNT_ENV_CAPITALIZED=${AWS_ACCOUNT_ENV^}" >>${GITHUB_ENV}
          export COMMIT_HASH_SHORT=${COMMIT_HASH::7}
          echo "COMMIT_HASH_SHORT=$COMMIT_HASH_SHORT" >>${GITHUB_ENV}
          export COMMIT_DESCRIPTION_EVT_HC=$(git show -s --format=%s)
          export COMMIT_DESCRIPTION_LAST=$(git log -1 --no-merges --pretty=%B)
          export COMMIT_DESCRIPTION="${COMMIT_DESCRIPTION_EVT_HC:-$COMMIT_DESCRIPTION_LAST}"
          echo "COMMIT_DESCRIPTION=$COMMIT_DESCRIPTION" >>${GITHUB_ENV}
          env -0 | sort -z | tr '\0' '\n'

      # Configure AWS credentials using IAM role
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::221082185791:role/GitHub-Actions-Role
          aws-region: us-east-1
          role-session-name: GitHubActionsDeploy

      # Deploy CDK stack
      - name: Deploy CDK
        run: |
          cd infra
          npm install
          npx cdk deploy --require-approval never

      # Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm install
          
          echo "NEXT_PUBLIC_REGION=${{ env.NEXT_PUBLIC_REGION }}" >> .env.local
          echo "NEXT_PUBLIC_USER_POOL_ID=${{ env.NEXT_PUBLIC_USER_POOL_ID }}" >> .env.local
          echo "NEXT_PUBLIC_USER_POOL_CLIENT_ID=${{ env.NEXT_PUBLIC_USER_POOL_CLIENT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}" >> .env.local
          echo "NEXT_PUBLIC_CLOUDFRONT_URL=${{ env.NEXT_PUBLIC_CLOUDFRONT_URL }}" >> .env.local
          
          npm run build

      # Deploy frontend to S3
      - name: Deploy frontend to S3
        run: |
          cd frontend
          aws s3 sync .next s3://${{ env.BUCKET_NAME }} --delete

      # Invalidate CloudFront cache
      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(cd infra && npx cdk output ${{ env.STACK_NAME }}CloudFrontDistributionId)
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"